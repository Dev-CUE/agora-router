system:
  a2a:
    max_speaker_calls: 10
    max_rounds: 10
    default_mode: "single"
    allow_self_call: false
    allow_cross_platform: false
  wiki:
    raw_logging_enabled: false
    raw_path: "data/wiki/raw/"

agents:
  - id: "agent-a"
    url: "http://agent-a:4001"
    a2a: { can_initiate: true, allowed_targets: "*" }
  - id: "agent-b"
    url: "http://agent-b:4002"
    a2a: { can_initiate: true, allowed_targets: "*" }
  - id: "agent-c"
    url: "http://agent-c:4003"
    a2a: { can_initiate: false, allowed_targets: [] }
  - id: "agent-d"
    url: "http://agent-d:4004"
    a2a: { can_initiate: false, allowed_targets: [] }
